<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Registrasi Event Lari</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#081b29,#0f3d5e,#0a2239);
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:25px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.header{
padding:20px;
text-align:center;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

.header h1{
font-size:28px;
}

.timer{
margin-top:10px;
font-weight:600;
color:#ffe600;
}

.page{
display:none;
padding:30px;
}

.page.active{
display:block;
}

.banner{
width:100%;
border-radius:18px;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input,
.input-group textarea,
.input-group select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
}

.input-group option{
color:black;
}

textarea{
resize:none;
height:100px;
}

.radio-group{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.radio-group label{
background:rgba(255,255,255,0.12);
padding:12px 20px;
border-radius:14px;
cursor:pointer;
}

.button-group{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.btn-back{
background:#555;
color:white;
}

.btn-next{
background:linear-gradient(90deg,#00ffae,#00c6ff);
color:#081b29;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.qris-box{
border:2px dashed #00f7ff;
padding:20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.qris-box img{
width:260px;
max-width:100%;
background:white;
padding:10px;
border-radius:12px;
margin:15px 0;
}

.checkbox{
display:flex;
gap:10px;
margin-top:20px;
}

.success-box{
text-align:center;
}

.bio{
margin-top:20px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:18px;
text-align:left;
}

.loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

.loading-screen.active{
display:flex;
}

.loader{
width:90px;
height:90px;
border:8px solid rgba(255,255,255,0.2);
border-top:8px solid #00f7ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:25px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loading-text{
font-size:22px;
font-weight:700;
color:#00f7ff;
}

.loading-sub{
margin-top:10px;
}

@media(max-width:768px){
.button-group{
flex-direction:column;
}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
<div class="loader"></div>
<div class="loading-text">MOHON TUNGGU...</div>
<div class="loading-sub">
Mengalihkan ke halaman beranda dalam
<span id="loadingCount">10</span> detik
</div>
</div>

<div class="container">

<div class="header">
<h1>BROOK FRAM ALMOND RUN</h1>
<div class="timer">
Sisa Waktu Pengisian :
<span id="countdown">10:00</span>
</div>
</div>

<!-- PAGE 1 -->
<div class="page active" id="page1">

<img src="banner.png" class="banner">

<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" id="nama">
</div>

<div class="input-group">
<label>Jenis Kelamin</label>
<div class="radio-group">
<label><input type="radio" name="gender">Laki-laki</label>
<label><input type="radio" name="gender">Perempuan</label>
</div>
</div>

<div class="input-group">
<label>Tempat Lahir</label>
<input type="text" id="tempatLahir">
</div>

<div class="input-group">
<label>Tanggal Lahir</label>
<input type="date" id="tanggalLahir">
</div>

<div class="input-group">
<label>Umur</label>
<input type="number" id="umur">
</div>

<div class="input-group">
<label>Nomor WhatsApp</label>
<input type="tel" id="wa">
</div>

<div class="input-group">
<label>Email Aktif</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Alamat Lengkap</label>
<textarea id="alamat"></textarea>
</div>

<div class="input-group">
<label>Kota / Provinsi</label>
<input type="text" id="kota">
</div>

<div class="input-group">
<label>Upload KTP</label>
<input type="file" id="ktp">
</div>

<div class="button-group">
<button class="btn-back" disabled>Kembali</button>
<button class="btn-next" id="next1" disabled>Selanjutnya</button>
</div>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

<h2 style="margin-bottom:20px;">CATEGORY LARI</h2>

<div class="input-group">
<label>Category</label>
<select id="category">
<option value="">Pilih</option>
<option>5K</option>
<option>10K</option>
</select>
</div>

<div class="input-group">
<label>Size Jersey</label>
<select id="size">
<option value="">Pilih</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
</div>

<div class="button-group">
<button class="btn-back" onclick="showPage(1)">Kembali</button>
<button class="btn-next" id="next2" disabled>Selanjutnya</button>
</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

<div class="qris-box">
<h2>PEMBAYARAN QRIS</h2>

<img src="qris-pembayaran.png">

<p>Silahkan upload bukti pembayaran</p>
</div>

<div class="input-group">
<label>Upload Bukti Pembayaran</label>
<input type="file" id="bukti">
</div>

<div class="checkbox">
<input type="checkbox" id="setuju">
<label>Saya setuju dengan syarat event</label>
</div>

<div class="button-group">
<button class="btn-back" onclick="showPage(2)">Kembali</button>
<button class="btn-next" id="daftarBtn" disabled>DAFTAR</button>
</div>

</div>

<!-- PAGE 4 -->
<div class="page" id="page4">

<div class="success-box">

<h2>TERIMA KASIH!</h2>

<p>Pendaftaran berhasil diproses.</p>

<div class="bio" id="bioData"></div>

<div class="button-group">
<button class="btn-next" onclick="goHome()">BERANDA</button>
</div>

</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll('.page').forEach(el=>{
el.classList.remove('active');
});

document.getElementById('page'+page).classList.add('active');

}

let duration = 600;

const countdown = document.getElementById('countdown');

const timer = setInterval(()=>{

let minutes = Math.floor(duration/60);
let seconds = duration%60;

countdown.innerHTML =
`${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

duration--;

if(duration < 0){
clearInterval(timer);
alert("Waktu habis");
}

},1000);

function validatePage1(){

const inputs = [
'nama',
'tempatLahir',
'tanggalLahir',
'umur',
'wa',
'email',
'alamat',
'kota'
];

let valid = true;

inputs.forEach(id=>{
if(document.getElementById(id).value.trim() === ''){
valid = false;
}
});

if(document.getElementById('ktp').files.length === 0){
valid = false;
}

if(!document.querySelector('input[name="gender"]:checked')){
valid = false;
}

document.getElementById('next1').disabled = !valid;

}

document.querySelectorAll('#page1 input, #page1 textarea').forEach(el=>{
el.addEventListener('input', validatePage1);
el.addEventListener('change', validatePage1);
});

document.getElementById('next1').onclick = function(){
showPage(2);
};

function validatePage2(){

let category =
document.getElementById('category').value;

let size =
document.getElementById('size').value;

document.getElementById('next2').disabled =
(category === '' || size === '');

}

document.getElementById('category').addEventListener('change', validatePage2);
document.getElementById('size').addEventListener('change', validatePage2);

document.getElementById('next2').onclick = function(){
showPage(3);
};

function validatePage3(){

let bukti =
document.getElementById('bukti').files.length > 0;

let setuju =
document.getElementById('setuju').checked;

document.getElementById('daftarBtn').disabled =
!(bukti && setuju);

}

document.getElementById('bukti').addEventListener('change', validatePage3);
document.getElementById('setuju').addEventListener('change', validatePage3);

document.getElementById('daftarBtn').onclick = function(){

document.getElementById('bioData').innerHTML = `
<b>Nama:</b> ${document.getElementById('nama').value}<br><br>
<b>Email:</b> ${document.getElementById('email').value}<br><br>
<b>WhatsApp:</b> ${document.getElementById('wa').value}<br><br>
<b>Category:</b> ${document.getElementById('category').value}<br><br>
<b>Size:</b> ${document.getElementById('size').value}
`;

showPage(4);

};

function goHome(){

const loading = document.getElementById('loadingScreen');

loading.classList.add('active');

let count = 10;

const loadingCount =
document.getElementById('loadingCount');

const interval = setInterval(()=>{

count--;

loadingCount.innerHTML = count;

if(count <= 0){

clearInterval(interval);

window.location.href = "index.html";

}

},1000);

}

</script>

</body>
</html>
